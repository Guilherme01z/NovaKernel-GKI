name: Compilar Kernel - Android 12 (5.10.240)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_branch:
        description: "Branch do KernelSU (main, dev ou commit hash)"
        required: false
        type: string
        default: "main"
      version:
        description: "Nome de versao customizado (opcional)"
        required: false
        type: string
      build_time:
        description: "Horario customizado do build (opcional, N ou vazio = UTC atual)"
        required: false
        type: string
        default: ""
      use_zram:
        description: "Ativar melhoria ZRAM LZ4KD"
        required: true
        type: boolean
        default: true
      use_bbg:
        description: "Ativar BBG Baseband Guard"
        required: true
        type: boolean
        default: true
      use_rekernel:
        description: "Ativar driver Re-Kernel"
        required: false
        type: boolean
        default: true
      cancel_susfs:
        description: "Desativar SUSFS"
        required: true
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "5.10.240-2025-09"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: "240"
      os_patch_level: "2025-09"
      ksu_variant: "Official"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
