name: Build Kernel - Android 12 (5.10.240)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_branch:
        description: "KernelSU branch (main, dev, or commit hash)"
        required: false
        type: string
        default: "main"
      version:
        description: "Custom version name (optional)"
        required: false
        type: string
      build_time:
        description: "Custom build time (optional, N or empty = current UTC)"
        required: false
        type: string
        default: ""
      use_zram:
        description: "Enable ZRAM LZ4KD enhancement"
        required: true
        type: boolean
        default: true
      use_bbg:
        description: "Enable BBG Baseband Guard"
        required: true
        type: boolean
        default: true
      use_rekernel:
        description: "Enable Re-Kernel driver"
        required: false
        type: boolean
        default: true
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "5.10.240-2025-09"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: "240"
      os_patch_level: "2025-09"
      ksu_variant: "Official"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
