name: Build Kernel - Android 12 (5.10)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      sub_level:
        description: "Kernel sublevel (e.g. 246, 237, 233, X=LTS=5.10.259)"
        required: true
        type: string
        default: "X"
      os_patch_level:
        description: "Security patch level (e.g. 2025-12, lts)"
        required: true
        type: string
        default: "lts"
      kernelsu_branch:
        description: "KernelSU branch (main, dev, or commit hash)"
        required: false
        type: string
        default: "main"
      version:
        description: "Custom version name (optional)"
        required: false
        type: string
      build_time:
        description: "Custom build time (optional, N or empty = current UTC)"
        required: false
        type: string
        default: ""
      use_zram:
        description: "Enable ZRAM LZ4KD enhancement"
        required: true
        type: boolean
        default: true
      use_bbg:
        description: "Enable BBG Baseband Guard"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel driver"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
      droidspaces:
        description: "Droidspaces container support"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      droidspaces_ntsync:
        description: "Enable Droidspaces NTSync (requires Droidspaces)"
        required: false
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "5.10.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      ksu_variant: "Official"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync || false }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
