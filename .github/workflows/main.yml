name: Build GKI Kernel

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions
      kernelsu_branch:
        description: "KernelSU branch (main, dev, or commit hash)"
        type: string
        default: "main"
        required: false
      version:
        description: "Custom version name (optional)"
        type: string
        default: ""
        required: false
      build_time:
        description: "Custom build time (optional, N or empty = current UTC)"
        type: string
        default: ""
        required: false
      use_zram:
        description: "Enable ZRAM LZ4KD enhancement"
        type: boolean
        default: true
      use_bbg:
        description: "Enable BBG Baseband Guard"
        type: boolean
        default: true
      use_rekernel:
        description: "Enable Re-Kernel driver"
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false

jobs:
  build-a12-5-10:
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}

  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs: build-a12-5-10
    steps:
      - name: Download reject files
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: Process reject files
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: Upload rejects
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore

  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && github.repository == 'Guilherme01z/NovaKernel-GKI' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Set display names
        run: |
          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV
          echo "RELEASE_NAME=GKI Kernel: KernelSU($KSU_VER) & SUSFS $SUS_VER" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Get KernelSU commit info
        run: |
          REPO_URL="https://github.com/tiann/KernelSU.git"
          BRANCH="${{ inputs.kernelsu_branch }}"
          if [ -n "$BRANCH" ]; then
            if [[ "$BRANCH" =~ ^[a-fA-F0-9]{40}$ ]]; then
              KSU_REF=$BRANCH
              KSU_URL="https://github.com/tiann/KernelSU/commit/$BRANCH"
            else
              COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/$BRANCH | awk '{ print $1 }')
              KSU_REF=$COMMIT_HASH
              KSU_URL="https://github.com/tiann/KernelSU/commit/$COMMIT_HASH"
            fi
          else
            TAG=$(git ls-remote --tags --sort=-v:refname $REPO_URL | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1)
            KSU_REF=$TAG
            KSU_URL="https://github.com/tiann/KernelSU/releases/tag/$TAG"
          fi
          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV

      - name: Get SUSFS commit info
        run: |
          COMMIT_HASH=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android12-5.10 | awk '{ print $1 }')
          echo "SUSFS_COMMIT=$COMMIT_HASH" >> $GITHUB_ENV
          echo "SUSFS_URL=https://gitlab.com/simonpunk/susfs4ksu/-/commit/$COMMIT_HASH" >> $GITHUB_ENV

      - name: Generate release notes
        run: |
          cat > release_body.md << EOF
          ## GKI Kernel Release

          **KernelSU** + **SUSFS ${{ env.SUS_VER }}**

          ### Features

          | Feature | Status |
          |:---|:---|
          | SUSFS | Enabled |
          | ZRAM LZ4KD | Enabled |
          | BBG | Enabled |
          | Re-Kernel | Disabled |

          ### Kernel Info

          | Component | Version |
          |:---|:---|
          | Android | 12 |
          | Kernel | 5.10.240 |
          | Patch Level | 2025-09 |
          | KernelSU | [${{ env.KSU_REF }}](${{ env.KSU_URL }}) |
          | SUSFS | [${{ env.SUSFS_COMMIT }}](${{ env.SUSFS_URL }}) |

          > **Before flashing, backup your stock boot image!**

          ### How to flash
          1. Download the AnyKernel3 zip below
          2. Open KernelSU Manager > Install > select the zip
          3. Reboot

          If boot fails: restore stock boot image and check logs.

          **Download**: Click **Assets** below
          EOF

      - name: Generate tag
        run: |
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          NEW_TAG="v${SUS_VERSION}-a12-5.10.240"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$NEW_TAG" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_body.md \
            --target "$GITHUB_SHA" \
            $PRERELEASE_FLAG

      - name: Upload manager and SUSFS module
        continue-on-error: true
        run: |
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done

      - name: Upload kernel artifacts
        run: |
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            [[ "$file" == *-Rejects/* ]] && continue
            gh release upload "$NEW_TAG" "$file"
          done

      - name: Publish release
        run: gh release edit --draft=false "$NEW_TAG"
