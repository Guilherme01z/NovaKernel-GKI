name: Compilar Kernel GKI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Tipo de release"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions
      kernelsu_branch:
        description: "Branch do KernelSU (main, dev ou commit hash)"
        type: string
        default: "main"
        required: false
      version:
        description: "Nome de versao customizado (opcional)"
        type: string
        default: ""
        required: false
      build_time:
        description: "Horario customizado do build (opcional, N ou vazio = UTC atual)"
        type: string
        default: ""
        required: false
      use_zram:
        description: "Ativar melhoria ZRAM LZ4KD"
        type: boolean
        default: true
      use_bbg:
        description: "Ativar BBG Baseband Guard"
        type: boolean
        default: true
      use_rekernel:
        description: "Ativar driver Re-Kernel"
        type: boolean
        default: true
      cancel_susfs:
        description: "Desativar SUSFS"
        type: boolean
        default: false

jobs:
  build-a12-5-10:
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}

  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit

  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs: build-a12-5-10
    steps:
      - name: Baixar arquivos rejeitados
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: Processar arquivos rejeitados
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: Enviar rejeicoes
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore

  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && github.repository == 'Guilherme01z/NovaKernel-GKI' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Definir nomes de exibicao
        run: |
          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV
          echo "RELEASE_NAME=GKI Kernel: KernelSU($KSU_VER) & SUSFS $SUS_VER" >> $GITHUB_ENV

      - name: Baixar codigo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Obter info do commit do KernelSU
        run: |
          REPO_URL="https://github.com/tiann/KernelSU.git"
          BRANCH="${{ inputs.kernelsu_branch }}"
          if [ -n "$BRANCH" ]; then
            if [[ "$BRANCH" =~ ^[a-fA-F0-9]{40}$ ]]; then
              KSU_REF=$BRANCH
              KSU_URL="https://github.com/tiann/KernelSU/commit/$BRANCH"
            else
              COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/$BRANCH | awk '{ print $1 }')
              KSU_REF=$COMMIT_HASH
              KSU_URL="https://github.com/tiann/KernelSU/commit/$COMMIT_HASH"
            fi
          else
            TAG=$(git ls-remote --tags --sort=-v:refname $REPO_URL | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1)
            KSU_REF=$TAG
            KSU_URL="https://github.com/tiann/KernelSU/releases/tag/$TAG"
          fi
          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV

      - name: Obter info do commit do SUSFS
        run: |
          COMMIT_HASH=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android12-5.10 | awk '{ print $1 }')
          echo "SUSFS_COMMIT=$COMMIT_HASH" >> $GITHUB_ENV
          echo "SUSFS_URL=https://gitlab.com/simonpunk/susfs4ksu/-/commit/$COMMIT_HASH" >> $GITHUB_ENV

      - name: Gerar notas da release
        run: |
          cat > release_body.md << EOF
          ## Release do Kernel GKI

          **KernelSU** + **SUSFS ${{ env.SUS_VER }}**

          ### Funcionalidades

          | Feature | Status |
          |:---|:---|
          | SUSFS | Enabled |
          | ZRAM LZ4KD | ${{ inputs.use_zram && 'Enabled' || 'Disabled' }} |
          | BBG | ${{ inputs.use_bbg && 'Enabled' || 'Disabled' }} |
          | Re-Kernel | ${{ inputs.use_rekernel && 'Enabled' || 'Disabled' }} |

          ### Info do Kernel

          | Componente | Versao |
          |:---|:---|
          | Android | 12 |
          | Kernel | 5.10.240 |
          | Patch Level | 2025-09 |
          | KernelSU | [${{ env.KSU_REF }}](${{ env.KSU_URL }}) |
          | SUSFS | [${{ env.SUSFS_COMMIT }}](${{ env.SUSFS_URL }}) |

          > **Antes de flashar, faca backup da imagem boot original!**

          ### Como flashar
          1. Baixe o zip AnyKernel3 abaixo
          2. Abra o KernelSU Manager > Instalar > selecione o zip
          3. Reinicie

          Se nao ligar: restaure a imagem boot original e verifique os logs.

          **Download**: Clique **Assets** abaixo
          EOF

      - name: Gerar tag
        run: |
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          NEW_TAG="v${SUS_VERSION}-a12-5.10.240"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Baixar artefatos
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      - name: Criar Release no GitHub
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$NEW_TAG" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_body.md \
            --target "$GITHUB_SHA" \
            $PRERELEASE_FLAG

      - name: Enviar manager e modulo SUSFS
        continue-on-error: true
        run: |
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done

      - name: Enviar artefatos do kernel
        run: |
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            [[ "$file" == *-Rejects/* ]] && continue
            gh release upload "$NEW_TAG" "$file"
          done

      - name: Publicar release
        run: gh release edit --draft=false "$NEW_TAG"
